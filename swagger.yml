                  description: ID de la orden entregada
                restaurantId:
                  type: string
                rating:
                  type: number
                  minimum: 1
                  maximum: 5
                  example: 4.5
                comment:
                  type: string
                  example: "Excelente comida y servicio"
                subRatings:
                  type: object
                  properties:
                    food:
                      type: number
                    service:
                      type: number
                    ambiance:
                      type: number
                photos:
                  type: array
                  items:
                    type: string
                    format: binary
                  maxItems: 3
      responses:
        '201':
          description: Reseña creada exitosamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Review'
        '400':
          description: Solo se pueden reseñar órdenes entregadas
