                  example: "65a1b2c3d4e5f6a7b8c9d0e1"
                date:
                  type: string
                  format: date
                  example: "2026-04-20"
                time:
                  type: string
                  pattern: "^\\d{2}:\\d{2}$"
                  example: "19:00"
                guests:
                  type: integer
                  minimum: 1
                  example: 4
                notes:
                  type: string
                  example: "Celebración especial"
